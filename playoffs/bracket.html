<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Playoff Bracket</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .division-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
    }

    .bracket {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .round-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 260px;
      position: relative;
    }

    .round-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
    }

    .game-box {
      background: white;
      padding: 12px;
      margin: 20px 0;
      border-radius: 6px;
      border-left: 6px solid #ccc;
      width: 100%;
      position: relative;
    }

    .hola {
      border-left-color: #f4c400;
      background: #fff7c2;
      font-weight: bold;
    }

    .label {
      font-weight: bold;
    }

    /* Horizontal connector line */
    .connector {
      width: 40px;
      height: 2px;
      background: #999;
      position: absolute;
      top: 50%;
      right: -40px;
    }

    /* Mobile stacking */
    @media (max-width: 900px) {
      .bracket {
        flex-direction: column;
        align-items: center;
      }
      .connector {
        display: none;
      }
    }
  </style>
</head>

<body>

<div id="content">Loading bracket...</div>

<script>
// ------------------------------
// 1. Read division from URL
// ------------------------------
const params = new URLSearchParams(window.location.search);
const divisionCode = params.get("division");

if (!divisionCode) {
  document.getElementById("content").innerHTML = "No division specified.";
  throw new Error("Missing ?division= parameter");
}

// ------------------------------
// 2. JSON API URL (YOUR REAL WEB APP URL)
// ------------------------------
const apiUrl = "https://script.google.com/macros/s/AKfycbwJuOUNgBRriM9c3JWZBAUcujOCl74Te7Zr7n0iWBdQ9cAd0K184VQxWLDNZ3_itPLYjw/exec";

// ------------------------------
// 3. Fetch JSON and render
// ------------------------------
fetch(apiUrl)
  .then(res => res.json())
  .then(data => {
    const division = data[divisionCode];
    if (!division) {
      document.getElementById("content").innerHTML = "Division not found.";
      return;
    }

    // Group games by round
    const rounds = { "QF": [], "SF": [], "Final": [] };

    division.games.forEach(game => {
      if (rounds[game.round]) {
        rounds[game.round].push(game);
      }
    });

    // Build HTML
    let html = `
      <div class="division-title">${division.name}</div>
      <div class="bracket">
    `;

    // Quarterfinals
    if (rounds["QF"].length > 0) {
      html += `<div class="round-column">
        <div class="round-title">Quarterfinals</div>
      `;
      rounds["QF"].forEach(game => {
        const isHOLA = game.teamA.includes("HOLA") || game.teamB.includes("HOLA");
        html += `
          <div class="game-box ${isHOLA ? "hola" : ""}">
            ${renderGame(game)}
            <div class="connector"></div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // Semifinals
    html += `<div class="round-column">
      <div class="round-title">Semifinals</div>
    `;
    rounds["SF"].forEach(game => {
      const isHOLA = game.teamA.includes("HOLA") || game.teamB.includes("HOLA");
      html += `
        <div class="game-box ${isHOLA ? "hola" : ""}">
          ${renderGame(game)}
          <div class="connector"></div>
        </div>
      `;
    });
    html += `</div>`;

    // Final
    html += `<div class="round-column">
      <div class="round-title">Final</div>
    `;
    rounds["Final"].forEach(game => {
      const isHOLA = game.teamA.includes("HOLA") || game.teamB.includes("HOLA");
      html += `
        <div class="game-box ${isHOLA ? "hola" : ""}">
          ${renderGame(game)}
        </div>
      `;
    });
    html += `</div></div>`; // end bracket

    document.getElementById("content").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("content").innerHTML = "Error loading bracket.";
    console.error(err);
  });

// ------------------------------
// 4. Game box renderer
// ------------------------------
function renderGame(game) {
  return `
    <div><span class="label">Game #:</span> ${game.game}</div>
    <div><span class="label">Teams:</span> ${game.teamA} vs ${game.teamB}</div>
    <div><span class="label">Date:</span> ${game.date}</div>
    <div><span class="label">Time:</span> ${game.time}</div>
    <div><span class="label">Location:</span> ${game.town} – ${game.complex} – ${game.field}</div>
    <div><span class="label">Next:</span> ${game.next || "Final"}</div>
  `;
}
</script>

</body>
</html>
