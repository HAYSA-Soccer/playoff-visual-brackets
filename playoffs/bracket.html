<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Playoff Bracket</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f4f5f7;
      color: #222;
    }

    .division-title {
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
    }

    .bracket-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 24px;
    }

    .bracket-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(240px, 1fr);
      gap: 32px;
      align-items: start;
    }

    .round-column {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .round-title {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      color: #555;
    }

    .game-box {
      border-radius: 10px;
      border: 1px solid #d0d4dc;
      background: #ffffff;
      padding: 10px 12px;
      font-size: 13px;
      position: relative;
    }

    .game-box.hola {
      border: 1px solid #f4c400;
      background: linear-gradient(135deg, #fff9d9, #fff3b0);
      box-shadow: 0 4px 12px rgba(244, 196, 0, 0.35);
      padding: 14px 16px;
    }

    .hola-tag {
      position: absolute;
      top: -10px;
      left: 12px;
      background: #f4c400;
      color: #222;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .game-id {
      font-weight: 600;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }

    .teams-line {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .date-line {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .details {
      margin-top: 6px;
      font-size: 12px;
      color: #333;
    }

    .details div {
      margin-bottom: 2px;
    }

    .feeds-from {
      margin-top: 6px;
      font-size: 11px;
      color: #555;
      border-top: 1px dashed rgba(0,0,0,0.15);
      padding-top: 4px;
    }

    @media (max-width: 900px) {
      .bracket-grid {
        grid-auto-flow: row;
        grid-auto-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div id="content">Loading bracket...</div>

<script>
const params = new URLSearchParams(window.location.search);
const divisionCode = params.get("division");

if (!divisionCode) {
  document.getElementById("content").innerHTML = "No division specified.";
} else {
  const apiUrl = "YOUR_WEB_APP_URL_HERE";  // ← Replace with your Apps Script URL

  fetch(apiUrl)
    .then(res => res.json())
    .then(data => renderBracket(data))
    .catch(err => {
      console.error(err);
      document.getElementById("content").innerHTML = "Error loading bracket.";
    });
}

function renderBracket(data) {
  const division = data[divisionCode];
  if (!division) {
    document.getElementById("content").innerHTML = "Division not found.";
    return;
  }

  const games = division.games || [];

  const roundOrder = ["Play-in", "QF", "SF", "Final"];
  const roundGroups = {};
  roundOrder.forEach(r => roundGroups[r] = []);

  games.forEach(g => {
    const r = normalizeRound(g.round);
    if (!roundGroups[r]) roundGroups[r] = [];
    roundGroups[r].push(g);
  });

  const feedersMap = {};
  games.forEach(g => {
    if (g.next) {
      if (!feedersMap[g.next]) feedersMap[g.next] = [];
      feedersMap[g.next].push(g);
    }
  });

  let html = `
    <div class="bracket-wrapper">
      <div class="division-title">${division.name}</div>
      <div class="bracket-grid">
  `;

  roundOrder.forEach(roundKey => {
    const roundGames = roundGroups[roundKey] || [];
    if (roundGames.length === 0) return;

    html += `<div class="round-column">
      <div class="round-title">${roundLabel(roundKey)}</div>
    `;

    roundGames.forEach(game => {
      const feeders = feedersMap[game.game] || [];
      html += renderGameBox(game, feeders);
    });

    html += `</div>`;
  });

  html += `</div></div>`;
  document.getElementById("content").innerHTML = html;
}

function normalizeRound(raw) {
  if (!raw) return "Play-in";
  const r = String(raw).toLowerCase();

  if (r.includes("play")) return "Play-in";
  if (r.includes("quarter")) return "QF";
  if (r === "qf" || r === "q") return "QF";
  if (r.includes("semi")) return "SF";
  if (r === "sf" || r === "s") return "SF";
  if (r.includes("final")) return "Final";
  if (r === "f") return "Final";

  return "Play-in";
}

function roundLabel(key) {
  switch (key) {
    case "Play-in": return "Play-in";
    case "QF": return "Quarterfinals";
    case "SF": return "Semifinals";
    case "Final": return "Final";
    default: return key;
  }
}

function renderGameBox(game, feeders) {
  const isHOLA =
    (game.teamA && game.teamA.toUpperCase().includes("HOLA")) ||
    (game.teamB && game.teamB.toUpperCase().includes("HOLA"));

  const outcome = getOutcome(game);

  const dateText = game.date || "";
  const timeText = game.time && game.time !== "-" ? game.time : "";

  const feedersText = feeders.length
    ? `<div class="feeds-from"><strong>Feeds from:</strong> ${feeders.map(f => f.game).join(", ")}</div>`
    : "";

  if (isHOLA) {
    return `
      <div class="game-box hola">
        <div class="hola-tag">HOLA Match</div>
        <div class="game-id">Game ${game.game}</div>
        <div class="teams-line">${outcome}</div>
        <div class="date-line">${dateText}${timeText ? " • " + timeText : ""}</div>
        <div class="details">
          ${game.town || game.complex || game.field ? `<div><strong>Location:</strong> ${[game.town, game.complex, game.field].filter(Boolean).join(" – ")}</div>` : ""}
          ${game.round ? `<div><strong>Round:</strong> ${game.round}</div>` : ""}
          ${game.next ? `<div><strong>Next:</strong> ${game.next}</div>` : ""}
        </div>
        ${feedersText}
      </div>
    `;
  }

  return `
    <div class="game-box">
      <div class="game-id">Game ${game.game}</div>
      <div class="teams-line">${outcome}</div>
      ${dateText ? `<div class="date-line">${dateText}</div>` : ""}
      ${feedersText}
    </div>
  `;
}

function getOutcome(game) {
  const A = game.teamA || "";
  const B = game.teamB || "";
  const sA = game.scoreA;
  const sB = game.scoreB;

  if (sA !== "" && sB !== "" && !isNaN(sA) && !isNaN(sB)) {
    return `${A} ${sA} – ${sB} ${B}`;
  }

  if (game.winner) {
    if (game.winner === A) return `${A} — Win<br>${B} — Loss`;
    if (game.winner === B) return `${A} — Loss<br>${B} — Win`;
  }

  return `${A || "Winner " + game.game} vs ${B || "Winner " + game.game}`;
}
</script>

</body>
</html>
