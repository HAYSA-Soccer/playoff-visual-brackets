
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Playoff Bracket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b1020;
      --card-bg: #161b2e;
      --card-border: #2b3558;
      --text: #f5f7ff;
      --muted: #9aa0c6;
      --accent: #4fd1c5;
      --line: #9aa0c6;

      /* HOLA improved contrast */
      --hola-bg: #1a1a1a;
      --hola-border: #f6d24a;
      --hola-text: #f6d24a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a2140 0, #050814 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .bracket-shell { width: 100%; max-width: 1200px; position: relative; }

    .bracket-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    .bracket-title {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .division-label { font-size: 0.9rem; color: var(--muted); }

    .rounds-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 2.5rem;
      position: relative;
      padding: 1rem 0 2rem;
    }

    .round-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      position: relative;
    }

    .round-name {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .game-card {
      width: 100%;
      max-width: 260px;
      background: var(--card-bg);
      border-radius: 0.6rem;
      border: 1px solid var(--card-border);
      padding: 0.6rem 0.7rem;
      position: relative;
    }

    /* HOLA improved contrast */
    .game-card.hola {
      background: var(--hola-bg);
      border: 2px solid var(--hola-border);
      color: var(--hola-text);
    }

    .hola-tag {
      position: absolute;
      top: -0.55rem;
      left: 0.7rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--hola-text);
      color: var(--hola-bg);
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      border: 1px solid var(--hola-border);
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .game-header .id { font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      margin: 0.15rem 0;
    }

    .team-name {
      flex: 1;
      padding-right: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-meta { display: flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; }

    .score { min-width: 1.4rem; text-align: right; }

    .result-tag {
      padding: 0.05rem 0.35rem;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-win { background: #38a169; color: #f0fff4; }
    .result-loss { background: #c53030; color: #fff5f5; }

    .meta-row {
      margin-top: 0.4rem;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .meta-pill {
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      border: 1px solid rgba(154,160,198,0.4);
    }

    svg.bracket-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    @media (max-width: 900px) {
      .rounds-grid { gap: 1.5rem; }
      .game-card { max-width: 220px; }
    }

    @media (max-width: 700px) {
      body { padding: 0.8rem; }
      .rounds-grid {
        grid-auto-flow: row;
        grid-auto-rows: auto;
      }
    }
  </style>
</head>

<body>
  <div class="bracket-shell">
    <div class="bracket-header">
      <div class="bracket-title">Playoff Bracket</div>
      <div class="division-label" id="divisionLabel"></div>
    </div>

    <svg class="bracket-lines"></svg>

    <div class="rounds-grid" id="roundsGrid"></div>
  </div>

  <script>
    const apiUrl = "https://script.google.com/macros/s/AKfycbwJuOUNgBRriM9c3JWZBAUcujOCl74Te7Zr7n0iWBdQ9cAd0K184VQxWLDNZ3_itPLYjw/exec";


    function getDivisionFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("division") || "";
    }

    function normalizeRound(raw) {
      if (!raw) return "Other";
      const s = raw.toString().trim().toLowerCase();
      if (["qf","q","quarter","quarterfinal","quarter final","quarter-finals","quarterfinals","quarter finals"].includes(s)) return "Quarterfinals";
      if (["sf","s","semi","semifinal","semi final","semi-finals","semifinals"].includes(s)) return "Semifinals";
      if (["f","final","finals","championship"].includes(s)) return "Final";
      if (["p","play-in","play in","playin"].includes(s)) return "Play-in";
      return raw;
    }

    function roundSortKey(name) {
      const n = normalizeRound(name);
      switch (n) {
        case "Play-in": return 0;
        case "Quarterfinals": return 1;
        case "Semifinals": return 2;
        case "Final": return 3;
        default: return 99;
      }
    }

    async function loadDivisionData(division) {
      const url = apiUrl + "?division=" + encodeURIComponent(division);
      const res = await fetch(url);
      if (!res.ok) throw new Error("API error");
      return res.json();
    }

    function isHolaTeam(name) {
      if (!name) return false;
      return name.toString().toLowerCase().includes("hola");
    }

    function buildBracket(games) {
      const grid = document.getElementById("roundsGrid");
      const svg = document.querySelector("svg.bracket-lines");
      grid.innerHTML = "";
      svg.innerHTML = "";

      const byRound = new Map();
      games.forEach(g => {
        const r = normalizeRound(g.round);
        if (!byRound.has(r)) byRound.set(r, []);
        byRound.get(r).push(g);
      });

      const orderedRounds = Array.from(byRound.keys()).sort((a,b) => roundSortKey(a) - roundSortKey(b));
      const cardPositions = new Map();

      orderedRounds.forEach((roundName, colIndex) => {
        const col = document.createElement("div");
        col.className = "round-column";

        const label = document.createElement("div");
        label.className = "round-name";
        label.textContent = roundName;
        col.appendChild(label);

        const roundGames = byRound.get(roundName);

        roundGames.forEach(game => {
          const card = document.createElement("div");
          card.className = "game-card";
          const isHola = isHolaTeam(game.teamA) || isHolaTeam(game.teamB);
          if (isHola) card.classList.add("hola");

          const header = document.createElement("div");
          header.className = "game-header";
          header.innerHTML = `
            <span class="id">${game.game}</span>
            <span class="round-tag">${normalizeRound(game.round)}</span>
          `;
          card.appendChild(header);

          function makeTeamRow(name, score, isWinner) {
            const row = document.createElement("div");
            row.className = "team-row";

            const nameDiv = document.createElement("div");
            nameDiv.className = "team-name";
            nameDiv.textContent = name || "TBD";

            const meta = document.createElement("div");
            meta.className = "team-meta";

            const scoreSpan = document.createElement("span");
            scoreSpan.className = "score";
            scoreSpan.textContent = score ?? "";

            const tag = document.createElement("span");
            tag.className = "result-tag";
            if (isWinner === true) {
              tag.classList.add("result-win");
              tag.textContent = "WIN";
            } else if (isWinner === false) {
              tag.classList.add("result-loss");
              tag.textContent = "LOSS";
            }

            meta.appendChild(scoreSpan);
            meta.appendChild(tag);

            row.appendChild(nameDiv);
            row.appendChild(meta);
            return row;
          }

          const isWinnerA = game.winner && game.teamA && game.winner === game.teamA;
          const isWinnerB = game.winner && game.teamB && game.winner === game.teamB;

          card.appendChild(makeTeamRow(game.teamA, game.teamAScore, isWinnerA));
          card.appendChild(makeTeamRow(game.teamB, game.teamBScore, isWinnerB));

          const metaRow = document.createElement("div");
          metaRow.className = "meta-row";

          if (game.town) {
            const pill = document.createElement("span");
            pill.className = "meta-pill";
            pill.textContent = game.town + (game.complex ? " – " + game.complex : "") + (game.field ? " – " + game.field : "");
            metaRow.appendChild(pill);
          }

          if (game.date || game.time) {
            const pill = document.createElement("span");
            pill.className = "meta-pill";
            pill.textContent = (game.date || "") + (game.time ? " • " + game.time : "");
            metaRow.appendChild(pill);
          }

          if (metaRow.childElementCount) card.appendChild(metaRow);

          if (isHola) {
            const holaTag = document.createElement("div");
            holaTag.className = "hola-tag";
            holaTag.textContent = "HOLA Match";
            card.appendChild(holaTag);
          }

          col.appendChild(card);

          requestAnimationFrame(() => {
            const rect = card.getBoundingClientRect();
            const shellRect = document.querySelector(".bracket-shell").getBoundingClientRect();
            cardPositions.set(game.game, {
              x: rect.left - shellRect.left + rect.width,
              y: rect.top - shellRect.top + rect.height / 2,
              w: rect.width,
              h: rect.height,
              col: colIndex
            });
          });
        });

        grid.appendChild(col);
      });

      requestAnimationFrame(() => {
        const svg = document.querySelector("svg.bracket-lines");
        const shellRect = document.querySelector(".bracket-shell").getBoundingClientRect();

        games.forEach(game => {
          const fromId = game.game;
          const toId = game.nextMatch;
          if (!fromId || !toId) return;

          const fromPos = cardPositions.get(fromId);
          const toPos = cardPositions.get(toId);
          if (!fromPos || !toPos) return;

          const startX = fromPos.x;
          const startY = fromPos.y;
          const endX = toPos.x - toPos.w;
          const endY = toPos.y;
          const midX = (startX + endX) / 2;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", `M ${startX} ${startY} H ${midX} V ${endY} H ${endX}`);
          path.setAttribute("stroke", getComputedStyle(document.documentElement).getPropertyValue("--line").trim());
          path.setAttribute("stroke-width", "2");
          path.setAttribute("fill", "none");
          path.setAttribute("stroke-linecap", "round");
          svg.appendChild(path);
        });
      });
    }

    (async function init() {
      const division = getDivisionFromQuery();
      document.getElementById("divisionLabel").textContent = division || "";

      if (!division) {
        document.getElementById("roundsGrid").innerHTML =
          "<div style='color:#f56565;font-size:0.9rem;'>No division specified (?division=...).</div>";
        return;
      }

      try {
        const data = await loadDivisionData(division);
        const games = Array.isArray(data) ? data : (data.games || []);
        if (!games.length) {
          document.getElementById("roundsGrid").innerHTML =
            "<div style='color:#f56565;font-size:0.9rem;'>No games found for this division.</div>";
          return;
        }
        buildBracket(games);
      } catch (e) {
        document.getElementById("roundsGrid").innerHTML =
          "<div style='color:#f56565;font-size:0.9rem;'>Error loading bracket.</div>";
        console.error(e);
      }
    })();
  </script>
</body>
</html>
