<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HAYSA Playoff Brackets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --hay-navy: #0F1E4D;
      --hay-royal: #1B3A8A;
      --hay-orange: #F47A20;
      --hay-gold: #F6A94A;
      --hay-text-light: #F9FAFB;
      --hay-text-muted: #CBD5F5;
      --hay-card-bg: #111827;
      --hay-border-soft: #1F2937;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--hay-navy);
      color: var(--hay-text-light);
      min-height: 100vh;
    }

    .page-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 0.95rem;
      color: var(--hay-text-muted);
      margin-bottom: 16px;
    }

    .division-nav-wrapper {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(15, 30, 77, 0.98), rgba(15, 30, 77, 0.92));
      backdrop-filter: blur(10px);
      padding: 8px 0 10px;
      border-bottom: 1px solid rgba(17, 24, 39, 0.8);
    }

    .division-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px;
      scrollbar-width: thin;
    }

    .division-pill {
      flex: 0 0 auto;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(17, 24, 39, 0.9);
      color: var(--hay-text-light);
      font-size: 0.85rem;
      white-space: nowrap;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
    }

    .division-pill span.grade { font-weight: 600; color: var(--hay-orange); }
    .division-pill span.gender { font-weight: 500; color: var(--hay-text-muted); }
    .division-pill span.code { font-weight: 600; color: var(--hay-text-light); }

    .division-pill.active {
      border-color: var(--hay-orange);
      box-shadow: 0 0 0 1px rgba(244, 122, 32, 0.6);
      background: radial-gradient(circle at top left, rgba(244, 122, 32, 0.25), rgba(17, 24, 39, 0.95));
    }

    .division-section { margin-top: 24px; padding-top: 8px; }

    .division-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .division-title {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .division-meta {
      font-size: 0.8rem;
      color: var(--hay-text-muted);
    }

    .division-separator {
      height: 1px;
      background: linear-gradient(
        to right,
        rgba(31, 41, 55, 0.0),
        rgba(31, 41, 55, 0.9),
        rgba(31, 41, 55, 0.0)
      );
      margin: 8px 0 12px;
    }

    .back-to-top {
      font-size: 0.8rem;
      color: var(--hay-orange);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }

    .bracket-container {
      position: relative;
      min-height: 260px;
      border-radius: 12px;
      border: 1px solid var(--hay-border-soft);
      background: radial-gradient(circle at top left, rgba(27, 58, 138, 0.18), rgba(17, 24, 39, 0.98));
      overflow: hidden;
      padding: 10px 10px 14px;
    }

    .skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(15, 30, 77, 0.95),
        rgba(27, 58, 138, 0.95),
        rgba(244, 122, 32, 0.18),
        rgba(15, 30, 77, 0.95)
      );
      background-size: 200% 200%;
      animation: shimmer 1.4s ease-in-out infinite;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bracket-inner {
      position: relative;
      opacity: 0;
      transition: opacity 0.25s ease-out;
    }

    .bracket-container.loaded .bracket-inner { opacity: 1; }

    @media (max-width: 768px) {
      .page-shell { padding: 12px 8px 32px; }
      .page-title { font-size: 1.4rem; }
      .bracket-container { min-height: 220px; }
    }
  </style>

  <script src="playoffs/bracket-engine.js" defer></script>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwJuOUNgBRriM9c3JWZBAUcujOCl74Te7Zr7n0iWBdQ9cAd0K184VQxWLDNZ3_itPLYjw/exec";


    let divisions = [];
    let divisionSections = {};
    let navPills = {};
    let loadedDivisions = new Set();

    function parseDivisionCode(code) {
      const genderChar = code.charAt(0);
      const rest = code.slice(1);
      const parts = rest.split(".");
      const gradeNum = parseInt(parts[0], 10);
      const divNum = parts[1] ? parseInt(parts[1], 10) : 1;

      const genderLabel = genderChar === "G" ? "Girls" : "Boys";

      let gradeLabel = "";
      if (!Number.isFinite(gradeNum)) {
        gradeLabel = "";
      } else if (gradeNum >= 12) gradeLabel = "Grade 11/12";
      else if (gradeNum >= 10) gradeLabel = "Grade 9/10";
      else if (gradeNum >= 8) gradeLabel = "Grade 7/8";
      else if (gradeNum >= 6) gradeLabel = "Grade 5/6";
      else if (gradeNum >= 4) gradeLabel = "Grade 3/4";
      else gradeLabel = "Grade 1/2";

      return {
        code,
        genderLabel,
        gradeLabel,
        divNum,
        sortKey: `${genderLabel}-${gradeLabel}-${code}`
      };
    }

    async function fetchAllDivisions() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const unique = new Map();
      data.forEach(row => {
        if (!row.Division) return;
        const code = String(row.Division).trim();
        if (!unique.has(code)) unique.set(code, parseDivisionCode(code));
      });

      divisions = Array.from(unique.values()).sort((a, b) =>
        a.sortKey.localeCompare(b.sortKey)
      );
    }

    function buildNav() {
      const nav = document.getElementById("division-nav");
      nav.innerHTML = "";

      divisions.forEach(div => {
        const pill = document.createElement("button");
        pill.className = "division-pill";
        pill.setAttribute("data-division", div.code);

        const gradeSpan = document.createElement("span");
        gradeSpan.className = "grade";
        gradeSpan.textContent = div.gradeLabel || div.code;

        const genderSpan = document.createElement("span");
        genderSpan.className = "gender";
        genderSpan.textContent = div.genderLabel;

        const codeSpan = document.createElement("span");
        codeSpan.className = "code";
        codeSpan.textContent = div.code;

        pill.appendChild(gradeSpan);
        pill.appendChild(genderSpan);
        pill.appendChild(codeSpan);

        pill.addEventListener("click", () => {
          divisionSections[div.code].scrollIntoView({ behavior: "smooth" });
        });

        nav.appendChild(pill);
        navPills[div.code] = pill;
      });
    }

    function buildSections() {
      const container = document.getElementById("division-sections");
      container.innerHTML = "";

      divisions.forEach(div => {
        const section = document.createElement("section");
        section.className = "division-section";
        section.id = `division-${div.code}`;

        const header = document.createElement("div");
        header.className = "division-header";

        const title = document.createElement("h2");
        title.className = "division-title";
        title.textContent = div.gradeLabel
          ? `${div.genderLabel} ${div.gradeLabel} — ${div.code}`
          : `${div.genderLabel} — ${div.code}`;

        const meta = document.createElement("div");
        meta.className = "division-meta";
        meta.textContent = "Winner advances through playoffs";

        header.appendChild(title);
        header.appendChild(meta);

        const separator = document.createElement("div");
        separator.className = "division-separator";

        const bracketContainer = document.createElement("div");
        bracketContainer.className = "bracket-container";
        bracketContainer.setAttribute("data-division", div.code);

        const skeleton = document.createElement("div");
        skeleton.className = "skeleton";

        bracketContainer.appendChild(skeleton);

        const inner = document.createElement("div");
        inner.className = "bracket-inner";
        inner.setAttribute("data-division-inner", div.code);

        bracketContainer.appendChild(inner);

        const backToTop = document.createElement("a");
        backToTop.href = "#top";
        backToTop.className = "back-to-top";
        backToTop.textContent = "↑ Back to top";

        section.appendChild(header);
        section.appendChild(separator);
        section.appendChild(bracketContainer);
        section.appendChild(backToTop);

        container.appendChild(section);
        divisionSections[div.code] = section;
      });
    }

    async function loadBracketForDivision(code) {
      if (loadedDivisions.has(code)) return;
      loadedDivisions.add(code);

      const bracketContainer = document.querySelector(`.bracket-container[data-division="${code}"]`);
      const inner = bracketContainer.querySelector(".bracket-inner");
      const skeleton = bracketContainer.querySelector(".skeleton");

      try {
        const res = await fetch(`${API_URL}?division=${encodeURIComponent(code)}`);
        const data = await res.json();

        window.HAYSA_BRACKET_ENGINE.renderBracket(inner, data, {
          divisionCode: code,
          theme: {
            navy: "#0F1E4D",
            royal: "#1B3A8A",
            orange: "#F47A20",
            gold: "#F6A94A",
            cardBg: "#111827",
            borderSoft: "#1F2937"
          }
        });

        skeleton.classList.add("hidden");
        bracketContainer.classList.add("loaded");
      } catch (e) {
        skeleton.classList.add("hidden");
        bracketContainer.classList.add("loaded");
        inner.innerHTML = `<div style="padding:8px;font-size:0.85rem;color:#FCA5A5;">Unable to load bracket for ${code}.</div>`;
      }
    }

    function setupIntersectionObserver() {
      const observer = new IntersectionObserver(
        entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              loadBracketForDivision(entry.target.getAttribute("data-division"));
            }
          });
        },
        { threshold: 0.2 }
      );

      document.querySelectorAll(".bracket-container").forEach(el => observer.observe(el));
    }

    function setupActiveNavHighlight() {
      const observer = new IntersectionObserver(
        entries => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            const code = entry.target.id.replace("division-", "");
            Object.values(navPills).forEach(p => p.classList.remove("active"));
            navPills[code]?.classList.add("active");
          });
        },
        { threshold: 0.4 }
      );

      Object.values(divisionSections).forEach(section => observer.observe(section));
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const topAnchor = document.createElement("div");
      topAnchor.id = "top";
      document.body.prepend(topAnchor);

      await fetchAllDivisions();
      buildNav();
      buildSections();
      setupIntersectionObserver();
      setupActiveNavHighlight();

      if (divisions[0]) loadBracketForDivision(divisions[0].code);
    });
  </script>
</head>

<body>
  <div class="page-shell">
    <header>
      <h1 class="page-title">HAYSA Playoff Brackets</h1>
      <p class="page-subtitle">All divisions, oldest to youngest — live, dynamic, and HAYSA‑branded.</p>
    </header>

    <div class="division-nav-wrapper">
      <div id="division-nav" class="division-nav"></div>
    </div>

    <main id="division-sections"></main>
  </div>
</body>
</html>
